name: Web / WASM (Pyodide) Calculator

# IMPORTANT:
# - ONLY runs on direct pushes to main (never PRs, never other branches).
# - This keeps "main is sacred" and the live calculator always matches the canonical tree.
# - After merge to main, the site is rebuilt and redeployed.
#
# PREREQUISITE (one-time per repo / after org move):
#   Go to the repo on GitHub → Settings → Pages
#   Under "Build and deployment" → "Source" select "GitHub Actions"
#   (Not "Deploy from a branch".)
#   This is required for `actions/configure-pages` and `deploy-pages` to succeed.
#   If you see "Get Pages site failed" / HttpError: Not Found, this is the cause.
#
# Node 20 deprecation note: actions/checkout, setup-python, configure-pages etc. are
# on Node 20. GitHub will force Node 24 later in 2026. You can opt-in early with
#   env:
#     FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
#   at workflow or job level if desired.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Opt into Node 24 for JS-based actions to silence deprecation warnings
    # (and be ready for the future default). Safe to remove later.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout (full history for setuptools_scm)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools_scm

      - name: Build wheel (and sdist)
        run: |
          python -m build
          ls -l dist/

      - name: Prepare site directory
        run: |
          mkdir -p _site/wheels _site/refs

          # Copy the static web assets (html, js, css, docs)
          cp -r web/* _site/ || true

          # Copy the freshly built wheel (there should be exactly one matching)
          WHEEL=$(ls dist/pyhqiv-*-py3-none-any.whl | head -1)
          cp "$WHEEL" _site/wheels/

          # Write a tiny manifest so the JS can find the exact name without glob
          WHEEL_BASENAME=$(basename "$WHEEL")
          echo "{\"wheel\": \"${WHEEL_BASENAME}\", \"built_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > _site/wheels/manifest.json

          # Also copy the small reference data (for sigma display)
          cp -f web/refs/binding_refs.json _site/refs/ 2>/dev/null || true

          echo "Staged site contents:"
          find _site -type f | sort

      - name: Inject wheel filename into index.html (robust fallback)
        run: |
          WHEEL_BASENAME=$(ls _site/wheels/pyhqiv-*-py3-none-any.whl | head -1 | xargs basename)
          # If the JS doesn't pick it up from manifest, the data-wheel attr is a second channel
          sed -i "s|data-wheel=\"[^\"]*\"|data-wheel=\"wheels/${WHEEL_BASENAME}\"|g" _site/index.html || true
          # Also make the placeholder easy to see in source for debugging
          sed -i "s|__PYHQIV_WHEEL__|wheels/${WHEEL_BASENAME}|g" _site/index.html || true

      - name: Setup Pages
        # This step queries the repo's Pages configuration via the GitHub API.
        # It will fail with "Get Pages site failed. HttpError: Not Found" until
        # you have enabled GitHub Pages + set Source = "GitHub Actions" in
        # Settings > Pages (see top of this file).
        uses: actions/configure-pages@v4
        # with:
        #   token: ${{ secrets.GITHUB_TOKEN }}  # default is fine
        #   # enablement: true   # some versions support forcing enablement; usually use the UI instead

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Opt into Node 24 for JS-based actions (see build job)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
